name: Deploy (Gated)

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Deployment target environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production
  push:
    branches:
      - main

concurrency:
  group: deploy-gated-${{ github.ref }}
  cancel-in-progress: false

jobs:
  helena-rollout-gate:
    name: Helena Rollout Promotion Gate
    uses: ./.github/workflows/helena-rollout-gate.yml

  verify-backend:
    name: Verify Backend Build
    runs-on: ubuntu-latest
    needs: [helena-rollout-gate]
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Backend typecheck
        run: npm run typecheck

      - name: Backend build
        run: npm run build

  verify-frontend:
    name: Verify Frontend Build
    runs-on: ubuntu-latest
    needs: [helena-rollout-gate]
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Frontend lint
        run: npm run lint

      - name: Frontend test
        run: npm run test

      - name: Frontend build
        run: npm run build

  deployment-readiness:
    name: Deployment Readiness
    runs-on: ubuntu-latest
    needs: [verify-backend, verify-frontend]
    steps:
      - name: Summarize readiness
        run: |
          echo "All deploy gates passed."
          echo "- Helena rollout gate: PASS"
          echo "- Backend verify: PASS"
          echo "- Frontend verify: PASS"
          echo "Attach platform-specific deploy jobs after this gate if needed."